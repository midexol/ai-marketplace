[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
test = 'test'
cache_path = 'cache'

# Optimizer settings
optimizer = true
optimizer_runs = 200

# Solidity version
solc = '0.8.20'

# EVM version
evm_version = 'paris'

[profile.test]
optimizer = false

[profile.production]
optimizer_runs = 1000

# Named RPC endpoints — deploy with: forge script ... --rpc-url base_sepolia
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
eth_sepolia = "${ETH_SEPOLIA_RPC}"
